<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right,#1d2671,#c33764);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:35px;
            width:420px;
            border-radius:18px;
            box-shadow:0 0 25px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#1d2671;
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
            color:#333;
        }

        input,select{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:16px;
            outline:none;
        }

        input:focus,
        select:focus{
            border-color:#1d2671;
            box-shadow:0 0 8px rgba(29,38,113,0.4);
        }

        button{
            width:100%;
            padding:14px;
            background:#1d2671;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#c33764;
            transform:scale(1.03);
        }

        .result{
            margin-top:25px;
            text-align:center;
            font-size:24px;
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>House Price Prediction</h1>

    <form action="/predict" method="POST">

        <label>Select Location</label>

        <select name="location" required>

            {% for location in locations %}

                <option value="{{ location }}">
                    {{ location }}
                </option>

            {% endfor %}

        </select>


        <label>Enter BHK</label>
        <input type="number" name="bhk" placeholder="Enter BHK" required>


        <label>Enter Number of Bathrooms</label>
        <input type="number" name="bath" placeholder="Enter Bathrooms" required>


        <label>Enter Square Feet</label>
        <input type="number" name="sqft" placeholder="Enter Square Feet" required>


        <button type="submit">
            Predict Price
        </button>

    </form>

    {% if prediction_text %}

        <div class="result">
            {{ prediction_text }}
        </div>

    {% endif %}

</div>

</body>
</html>
